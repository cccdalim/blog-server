# LJL Blog — Nginx 完整站点配置示例
# 复制到 /etc/nginx/sites-available/ljl-blog 后修改域名和路径

server {
    listen 80;
    server_name your-domain.com;

    # 前端静态资源
    root /opt/ljl-blog/web/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 上传图片 — 必须用 ^~ 阻止下方 *.jpg 等正则 location 抢走请求
    location ^~ /uploads/ {
        alias /opt/ljl-blog/data/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # 备选方案（更简单，无需与 Nginx 同步磁盘路径）：
    # location ^~ /uploads/ {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # API 反代到 Spring Boot
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # SPA 路由 — 所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存（Vite 构建带 hash）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

# HTTPS 配置由 certbot 自动生成，或手动添加：
